<!doctype html>
<html lang="zh-Hant">
  <head>
    <!-- ========== 基礎 Meta ========== -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="頁面描述 — 建議 50~160 字元" />

    <!-- ========== SEO Meta ========== -->
    <title>頁面標題 — 品牌名稱</title>
    <link rel="canonical" href="https://example.com/" />

    <!-- ========== Open Graph ========== -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="頁面標題" />
    <meta property="og:description" content="頁面描述" />
    <meta property="og:image" content="https://example.com/og-image.jpg" />
    <meta property="og:url" content="https://example.com/" />
    <meta property="og:locale" content="zh_TW" />

    <!-- ========== 資源預載入 ========== -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- ========== 樣式 ========== -->
    <link rel="stylesheet" href="css/main.css" />

    <!-- ========== Favicon ========== -->
    <link rel="icon" href="assets/images/favicon.ico" />
  </head>
  <body>
    <!-- ========== 跳至主要內容（無障礙） ========== -->
    <a href="#main-content" class="skip-link">跳至主要內容</a>

    <!-- ========== Header 開始 ========== -->
    <header class="header" role="banner">
      <div class="header__container">
        <a href="/" class="header__logo" aria-label="回到首頁">
          <span class="header__logo-text">Brand</span>
        </a>

        <button
          class="header__menu-toggle"
          aria-expanded="false"
          aria-controls="main-nav"
          aria-label="開啟導航選單"
        >
          <span class="header__menu-icon"></span>
        </button>

        <nav id="main-nav" class="header__nav" aria-label="主導航">
          <ul class="header__nav-list">
            <li class="header__nav-item">
              <a
                href="/"
                class="header__nav-link header__nav-link--active"
                aria-current="page"
                >首頁</a
              >
            </li>
            <li class="header__nav-item">
              <a href="/about" class="header__nav-link">關於</a>
            </li>
            <li class="header__nav-item">
              <a href="/contact" class="header__nav-link">聯繫</a>
            </li>
          </ul>
        </nav>
      </div>
    </header>
    <!-- ========== Header 結束 ========== -->

    <!-- ========== Main 開始 ========== -->
    <main id="main-content" class="main">
      <!-- Hero Section -->
      <section class="hero" aria-labelledby="hero-title">
        <div class="hero__container">
          <h1 id="hero-title" class="hero__title">歡迎來到專案名稱</h1>
          <p class="hero__subtitle">簡潔描述你的專案核心價值</p>
          <a href="#features" class="hero__cta btn btn--primary">了解更多</a>
        </div>
      </section>

      <!-- Features Section -->
      <section id="features" class="features" aria-labelledby="features-title">
        <div class="features__container">
          <h2 id="features-title" class="features__title">功能特色</h2>
          <div class="features__grid">
            <article class="feature-card">
              <h3 class="feature-card__title">功能一</h3>
              <p class="feature-card__description">功能描述文字</p>
            </article>
            <article class="feature-card">
              <h3 class="feature-card__title">功能二</h3>
              <p class="feature-card__description">功能描述文字</p>
            </article>
            <article class="feature-card">
              <h3 class="feature-card__title">功能三</h3>
              <p class="feature-card__description">功能描述文字</p>
            </article>
          </div>
        </div>
      </section>
    </main>
    <!-- ========== Main 結束 ========== -->

    <!-- ========== Footer 開始 ========== -->
    <footer class="footer" role="contentinfo">
      <div class="footer__container">
        <p class="footer__copyright">
          &copy; 2025 品牌名稱. All rights reserved.
        </p>
      </div>
    </footer>
    <!-- ========== Footer 結束 ========== -->

    <!-- ========== 結構化資料 ========== -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "品牌名稱",
        "url": "https://example.com"
      }
    </script>

    <!-- ========== JavaScript ========== -->
    <script type="module" src="js/main.js"></script>
  </body>
</html>
